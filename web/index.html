<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>China Stock Strategies · 中国股票策略</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="js/app.js?v=6" defer></script>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-brand" data-i18n="brand">China Stock Strategies</div>
      <div class="nav-actions">
        <button class="theme-btn" id="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">☀</button>
        <div class="pill-toggle" role="group" aria-label="Language">
          <button class="pill-btn lang-btn active" data-lang="zh">中文</button>
          <button class="pill-btn lang-btn" data-lang="en">EN</button>
        </div>
      </div>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-inner">
      <div class="hero-eyebrow" data-i18n="hero.eyebrow">Quantitative Research</div>
      <h1 data-i18n="hero.title">中国股票策略仪表盘</h1>
      <p class="hero-sub" data-i18n="hero.subtitle">
        四套可执行的 A 股策略：当前持仓、历史净值与调仓规则，一目了然。
      </p>
    </div>
  </header>

  <div class="strategy-switcher">
    <div class="segmented" role="tablist">
      <button class="segment-btn active" data-strategy="etf" role="tab" aria-selected="true">
        <span data-i18n="strategies.etf.short">ETF 轮动</span>
      </button>
      <button class="segment-btn" data-strategy="ah" role="tab" aria-selected="false">
        <span data-i18n="strategies.ah.short">AH 折价</span>
      </button>
      <button class="segment-btn" data-strategy="dividend" role="tab" aria-selected="false">
        <span data-i18n="strategies.dividend.short">红利创业板</span>
      </button>
      <button class="segment-btn" data-strategy="equity" role="tab" aria-selected="false">
        <span data-i18n="strategies.equity.short">股权激励</span>
      </button>
    </div>
  </div>

  <main class="main">
    <div id="loading" class="loading" data-i18n="loading">Loading strategy data…</div>
    <div id="panels" class="hidden">
      <section id="panel-etf" class="strategy-panel active" role="tabpanel"></section>
      <section id="panel-ah" class="strategy-panel" role="tabpanel"></section>
      <section id="panel-dividend" class="strategy-panel" role="tabpanel"></section>
      <section id="panel-equity" class="strategy-panel" role="tabpanel"></section>
    </div>
  </main>

  <footer class="footer">
    <p data-i18n="footer.disclaimer">仅供研究参考，不构成投资建议。历史回测不代表未来表现。</p>
    <p id="data-timestamp"></p>
  </footer>
</body>
</html>
